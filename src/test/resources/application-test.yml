spring:
  datasource:
    url: jdbc:h2:mem:bookcircle_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false

app:
  jwt:
    secret: test-secret-key-for-jwt-must-be-at-least-32-bytes
    accessTokenMinutes: 120
  books:
    seedOnEmpty: false
