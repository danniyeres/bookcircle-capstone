spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET_KEY}
    accessTokenMinutes: 60
  h3:
    defaultResolution: 9
  books:
    seedOnEmpty: ${APP_BOOKS_SEED_ON_EMPTY:true}
    seedFile: ${APP_BOOKS_SEED_FILE:books.json}
    googleApiKey: ${GOOGLE_BOOKS_API_KEY:}
    maxResultsPerQuery: ${APP_BOOKS_MAX_RESULTS_PER_QUERY:1}
    requestDelayMs: ${APP_BOOKS_REQUEST_DELAY_MS:150}
    maxAttempts: ${APP_BOOKS_MAX_ATTEMPTS:3}
    retryBackoffMs: ${APP_BOOKS_RETRY_BACKOFF_MS:600}

logging:
  level:
    root: INFO
    bookcircle: INFO
